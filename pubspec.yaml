name: lose_fat
version: 1.0.0+1
description: Multi-profile growth and weight tracking app built with Flutter Material 3.
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.70.2
  intl: ^0.20.2
  sqflite: ^2.4.2
  shared_preferences: ^2.5.3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/APP_ICON.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/APP_ICON.png
  min_sdk_android: 21
